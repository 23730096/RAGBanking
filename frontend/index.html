<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG Banking Chat</title>
<style>
body{margin:0;font-family:Arial;background:#f5f7fb;display:flex;height:100vh}
.sidebar{width:260px;background:#fff;border-right:1px solid #ddd;overflow:auto}
.sidebar h3{padding:10px;margin:0;background:#0b5ed7;color:#fff}
.file{padding:8px 10px;border-bottom:1px solid #eee;font-size:13px}
.file a{text-decoration:none;color:#0b5ed7}
.main{flex:1;display:flex;flex-direction:column}
.header{padding:10px;background:#0b5ed7;color:#fff;display:flex;justify-content:space-between}
.chat{flex:1;overflow-y:auto;padding:16px}
.msg{max-width:70%;margin-bottom:12px;padding:10px 14px;border-radius:12px;line-height:1.4}
.user{background:#0b5ed7;color:#fff;margin-left:auto}
.bot{background:#fff}
.sources{font-size:12px;margin-top:6px}
.sources a{color:#0b5ed7;text-decoration:none}
.input{display:flex;padding:10px;background:#fff;border-top:1px solid #ddd}
input{flex:1;padding:10px}
button{margin-left:6px;padding:10px;background:#0b5ed7;color:#fff;border:none}
.typing{font-style:italic;color:#888}
</style>
</head>
<body>
<div class="sidebar">
<h3>Tài liệu</h3>
<div id="files"></div>
</div>
<div class="main">
<div class="header">
<div>RAG Banking</div>
<div id="status">...</div>
</div>
<div id="chat" class="chat"></div>
<div class="input">
<input id="q" placeholder="Nhập câu hỏi..." />
<button onclick="send()">Gửi</button>
</div>
</div>
<script>
const chat=document.getElementById('chat');

function addMsg(text,cls,sources){
  const d=document.createElement('div');
  d.className='msg '+cls;
  d.innerHTML=text.replace(/\n/g,'<br>');

  if(sources && sources.length){
    const s=document.createElement('div');
    s.className='sources';
    s.innerHTML='<b>Tài liệu:</b><br>'+sources.map(x=>`<a href="${x.download_url}" target="_blank">${x.source}</a>`).join('<br>');
    d.appendChild(s);
  }

  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function typing(){
  const t=document.createElement('div');
  t.className='msg bot typing';
  t.id='typing';
  t.innerText='Đang trả lời...';
  chat.appendChild(t);
  chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('typing');
  if(t) t.remove();
}

async function send(){
  const q=document.getElementById('q').value;
  if(!q) return;
  addMsg(q,'user');
  document.getElementById('q').value='';
  typing();

  try{
    const r=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
    const j=await r.json();
    removeTyping();
    addMsg(j.answer,'bot',j.sources);
  }catch{
    removeTyping();
    addMsg('Lỗi kết nối','bot');
  }
}

async function loadFiles(){
  const res=await fetch('/api/documents');
  const data=await res.json();
  const div=document.getElementById('files');
  data.items.forEach(f=>{
    const el=document.createElement('div');
    el.className='file';
    el.innerHTML=`<a href="${f.download_url}" target="_blank">${f.file_name}</a>`;
    div.appendChild(el);
  });
}

async function check(){
  try{
    const r=await fetch('/health');
    const j=await r.json();
    document.getElementById('status').innerText=j.status;
  }catch{document.getElementById('status').innerText='offline'}
}

loadFiles();
check();
</script>
</body>
</html>
