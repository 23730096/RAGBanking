<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAG Banking Chat</title>
<style>
body {font-family: Arial; margin:0; background:#f5f7fb; display:flex; justify-content:center;}
.container {width:100%; max-width:900px; height:100vh; display:flex; flex-direction:column;}
.header {padding:12px; background:#0b5ed7; color:white; display:flex; justify-content:space-between;}
.chat {flex:1; overflow-y:auto; padding:16px;}
.msg {margin-bottom:12px; max-width:70%; padding:10px 14px; border-radius:12px;}
.user {background:#0b5ed7; color:white; margin-left:auto;}
.bot {background:white;}
.sources {margin-top:6px; font-size:12px; color:#555;}
.input {display:flex; padding:10px; background:white;}
input {flex:1; padding:10px;}
button {padding:10px 14px; margin-left:6px; background:#0b5ed7; color:white; border:none;}
.status {font-size:12px;}
.ok {color:#0a0;}
.err {color:#a00;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div>RAG Banking</div>
<div id="status" class="status">checking...</div>
</div>
<div id="chat" class="chat"></div>
<div class="input">
<input id="q" placeholder="Nhập câu hỏi..." />
<button onclick="send()">Gửi</button>
</div>
</div>
<script>
const chat = document.getElementById("chat");
const statusEl = document.getElementById("status");

function addMsg(text, cls, sources){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = text.replace(/\n/g,'<br>');

  if(sources && sources.length){
    const s = document.createElement("div");
    s.className = "sources";
    s.innerHTML = sources.map(x=>{
      if(x.download_url){
        return `<a href="${x.download_url}" target="_blank">${x.source}</a>`;
      }
      return x.source;
    }).join("<br>");
    div.appendChild(s);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function check(){
  try{
    const r = await fetch('/health');
    const j = await r.json();
    statusEl.innerHTML = j.status === 'ok' ? '<span class="ok">online</span>' : 'error';
  }catch{
    statusEl.innerHTML = '<span class="err">offline</span>';
  }
}

async function send(){
  const q = document.getElementById("q").value;
  if(!q) return;
  addMsg(q,'user');
  document.getElementById("q").value='';

  try{
    const r = await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});
    const j = await r.json();
    addMsg(j.answer,'bot',j.sources);
  }catch(e){
    addMsg('Lỗi kết nối','bot');
  }
}

check();
</script>
</body>
</html>
