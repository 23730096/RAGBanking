version: 1

disable_existing_loggers: False

formatters:
  simple:
    format: '[%(asctime)s] %(levelname)s - %(name)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

  file:
    class: logging.FileHandler
    level: INFO
    formatter: simple
    filename: logs/application.log
    encoding: utf-8

loggers:
  ingestion:
    level: DEBUG
    handlers: [console, file]
    propagate: no

  embedding:
    level: DEBUG
    handlers: [console, file]
    propagate: no

  vector_database:
    level: DEBUG
    handlers: [console, file]
    propagate: no

  llm:
    level: DEBUG
    handlers: [console, file]
    propagate: no

  chat:
    level: DEBUG
    handlers: [console, file]
    propagate: no

root:
  level: INFO
  handlers: [console, file]