app:
  name: RAG-Banking-Support
  version: 1.0.0-beta
  env: production

data:
  raw_dir: data/raw
  processed_dir: data/processed

embedding:
  model: intfloat/multilingual-e5-small
  batch_size: 32
  device: cpu

vector_database:
  type: qdrant
  host: localhost
  port: 6333
  url: http://localhost:6333
  api_key: null
  collection_name: rag_banking_collection
  distance: cosine
  vector_size: 384
  timeout: 30

llm:
  provider: ollama
  model_name: qwen2.5:3b
  base_url: http://localhost:11434
  temperature: 0.2
  max_tokens: 512
  timeout: 60

retrieval:
  top_k: 5
  score_threshold: 0.4

  # hybrid config
  dense_weight: 0.7
  lexical_weight: 0.3
  dense_candidate_multiplier: 4

  # answer quality control
  min_context_items: 2
  min_answer_score: 0.5
  max_context_chars: 4000
